<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>물체계의 운동 — 자유물체도 학습</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161922;
    --surface2: #1e2330;
    --surface3: #252c3d;
    --border: #2e3650;
    --accent: #4f9eff;
    --accent2: #ff6b6b;
    --accent3: #6bffb8;
    --accent4: #ffd166;
    --text: #e8ecf4;
    --text2: #8b94b0;
    --text3: #5a6180;
    --A: #4f9eff;
    --B: #ff6b6b;
    --C: #6bffb8;
    --glow: 0 0 20px rgba(79,158,255,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    gap: 8px;
    flex-wrap: nowrap;
    min-height: 48px;
  }
  header h1 {
    font-size: clamp(0.65rem, 2.5vw, 1rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1 1 auto;
    min-width: 0;
  }
  header h1 span { color: var(--accent); }
  .score-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: clamp(0.7rem, 2vw, 0.85rem);
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent4);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Layout ── */
  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media(max-width:700px) { .app { grid-template-columns: 1fr; } }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
  }
  .card-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* ── Situation card (full width) ── */
  .full-width { grid-column: 1 / -1; }

  /* ── Situation selector ── */
  .scenario-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .scenario-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text2);
    padding: 8px 16px;
    font-size: 0.82rem;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .scenario-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: var(--glow);
  }
  .scenario-btn:hover:not(.active) {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Sliders ── */
  .sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .slider-group label {
    display: block;
    font-size: 0.78rem;
    color: var(--text2);
    margin-bottom: 4px;
  }
  .slider-group input[type=range] {
    width: 100%;
    accent-color: var(--accent);
  }
  .slider-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent4);
    font-weight: 700;
  }

  /* ── Canvas ── */
  #diagram-canvas {
    width: 100%;
    border-radius: 10px;
    background: var(--surface2);
    display: block;
  }

  /* ── Step guide ── */
  .steps { display: flex; flex-direction: column; gap: 10px; }
  .step {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .step::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--text3);
    transition: background 0.25s;
  }
  .step.active::before { background: var(--accent); }
  .step.done::before { background: var(--accent3); }
  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--surface3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    flex-shrink: 0;
    transition: all 0.25s;
  }
  .step.active .step-num { background: var(--accent); border-color: var(--accent); color: #fff; }
  .step.done .step-num { background: var(--accent3); border-color: var(--accent3); color: var(--bg); }
  .step-body {
    margin-top: 10px;
    font-size: 0.82rem;
    color: var(--text2);
    line-height: 1.7;
    display: none;
  }
  .step.active .step-body,
  .step.done .step-body { display: block; }

  /* formula boxes */
  .formula {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    color: var(--accent4);
    margin-top: 8px;
    line-height: 1.8;
  }
  .formula .eq-label {
    color: var(--text3);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.75rem;
    margin-bottom: 2px;
  }
  .hi-A { color: var(--A); font-weight: 700; }
  .hi-B { color: var(--B); font-weight: 700; }
  .hi-C { color: var(--C); font-weight: 700; }
  .hi-val { color: var(--accent4); font-weight: 700; }
  .hi-F { color: #c084fc; font-weight: 700; }

  /* ── FBD (Free body diagram) ── */
  .fbd-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .fbd-card {
    flex: 1;
    min-width: 160px;
    max-width: 220px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .fbd-card canvas { display: block; margin: 0 auto; max-width: 100%; }
  .fbd-card h3 {
    font-size: 0.78rem;
    color: var(--text2);
    margin-top: 8px;
    font-weight: 500;
  }
  .fbd-card .fbd-forces {
    font-size: 0.72rem;
    color: var(--text3);
    margin-top: 4px;
    line-height: 1.6;
    text-align: left;
  }

  /* ── Input quiz ── */
  .quiz-section { margin-top: 16px; }
  .quiz-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .quiz-label {
    font-size: 0.82rem;
    color: var(--text2);
    min-width: 180px;
  }
  .quiz-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 7px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    width: 90px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .quiz-input:focus { outline: none; border-color: var(--accent); }
  .quiz-input.correct { border-color: var(--accent3); background: rgba(107,255,184,0.08); }
  .quiz-input.wrong { border-color: var(--accent2); background: rgba(255,107,107,0.08); }
  .quiz-unit { font-size: 0.78rem; color: var(--text3); }
  .quiz-feedback { font-size: 0.78rem; margin-left: 4px; }
  .quiz-feedback.ok { color: var(--accent3); }
  .quiz-feedback.no { color: var(--accent2); }

  .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn {
    border: none;
    border-radius: 10px;
    padding: 10px 22px;
    font-size: 0.85rem;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.15); box-shadow: var(--glow); }
  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Hint panel ── */
  .hint-box {
    background: rgba(79,158,255,0.07);
    border: 1px solid rgba(79,158,255,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.8rem;
    color: var(--text2);
    line-height: 1.7;
    margin-top: 10px;
    display: none;
  }
  .hint-box.show { display: block; }

  /* ── Result message ── */
  .result-msg {
    font-size: 0.88rem;
    margin-top: 10px;
    padding: 10px 16px;
    border-radius: 10px;
    display: none;
  }
  .result-msg.show { display: block; }
  .result-msg.correct-msg {
    background: rgba(107,255,184,0.1);
    border: 1px solid rgba(107,255,184,0.3);
    color: var(--accent3);
  }
  .result-msg.wrong-msg {
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.3);
    color: var(--accent2);
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>물체계의 운동 <span>—</span> 자유물체도 단계 학습</h1>
  <div class="score-badge">점수 <span id="hdr-score">0</span></div>
</header>

<div class="app">

  <!-- ① 상황 선택 + 질량 설정 -->
  <div class="card full-width">
    <div class="card-title">상황 선택</div>
    <div class="scenario-tabs">
      <button class="scenario-btn active" onclick="setScenario(1)">① A·B 2물체 (수평)</button>
      <button class="scenario-btn" onclick="setScenario(2)">② A·B·C 3물체 (수평)</button>
      <button class="scenario-btn" onclick="setScenario(3)">③ 랜덤 문제</button>
    </div>
    <div class="sliders" id="slider-area"></div>
  </div>

  <!-- ② 다이어그램 -->
  <div class="card">
    <div class="card-title">물체 배치도</div>
    <canvas id="diagram-canvas" height="180"></canvas>
  </div>

  <!-- ③ 단계별 풀이 가이드 -->
  <div class="card">
    <div class="card-title">단계별 풀이</div>
    <div class="steps" id="steps-container"></div>
  </div>

  <!-- ④ 자유물체도 -->
  <div class="card full-width">
    <div class="card-title">자유물체도 (Free Body Diagram)</div>
    <div class="fbd-row" id="fbd-area"></div>
  </div>

  <!-- ⑤ 연습 문제 입력 -->
  <div class="card full-width">
    <div class="card-title">직접 풀어보기</div>
    <div class="quiz-section" id="quiz-area"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkAnswers()">정답 확인</button>
      <button class="btn btn-secondary" onclick="showHint()">힌트 보기</button>
      <button class="btn btn-secondary" onclick="nextProblem()">새 문제</button>
    </div>
    <div class="hint-box" id="hint-box"></div>
    <div class="result-msg" id="result-msg"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
const g = 10;
let scenario = 1;
let masses = { mA:4, mB:2, mC:3, F:27 };
let derived = {};
let totalScore = 0;
let hintShown = false;
let checked = false;

// ═══════════════════════════════════════════════════
//  SCENARIO SETUP
// ═══════════════════════════════════════════════════
function setScenario(s) {
  scenario = s;
  document.querySelectorAll('.scenario-btn').forEach((b,i)=>b.classList.toggle('active',i===s-1));
  if(s===3) randomProblem(); else buildSliders();
  compute();
  renderSteps();
  renderFBD();
  renderQuiz();
  drawDiagram();
  clearFeedback();
}

function buildSliders() {
  const area = document.getElementById('slider-area');
  const numC = scenario >= 2;
  const configs = [
    { key:'F', label:'힘 F (N)', min:5, max:60, step:1, color:'#c084fc' },
    { key:'mA', label:'A의 질량 (kg)', min:1, max:10, step:1, color:'var(--A)' },
    { key:'mB', label:'B의 질량 (kg)', min:1, max:10, step:1, color:'var(--B)' },
    ...(numC ? [{ key:'mC', label:'C의 질량 (kg)', min:1, max:10, step:1, color:'var(--C)' }] : []),
  ];
  area.innerHTML = configs.map(c=>`
    <div class="slider-group">
      <label style="color:${c.color}">${c.label}: <span class="slider-val" id="val-${c.key}">${masses[c.key]}</span></label>
      <input type="range" min="${c.min}" max="${c.max}" step="${c.step}" value="${masses[c.key]}"
        oninput="updateMass('${c.key}',this.value)">
    </div>
  `).join('');
}

function updateMass(key, val) {
  masses[key] = +val;
  document.getElementById('val-'+key).textContent = val;
  compute();
  renderSteps();
  renderFBD();
  renderQuiz();
  drawDiagram();
  clearFeedback();
}

function randomProblem() {
  const F_opts = [12,15,18,20,21,24,27,30,36];
  masses.F = F_opts[Math.floor(Math.random()*F_opts.length)];
  masses.mA = Math.floor(Math.random()*6)+2;
  masses.mB = Math.floor(Math.random()*6)+1;
  masses.mC = Math.floor(Math.random()*6)+1;
  scenario = 2; // always 3-body for random
  document.querySelectorAll('.scenario-btn').forEach((b,i)=>b.classList.toggle('active',i===2));
  buildSliders();
}

// ═══════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════
function compute() {
  const {mA, mB, mC, F} = masses;
  if(scenario===1) {
    // A·B 수평, F→오른쪽 → B에 작용
    const totalM = mA + mB;
    derived.a = F / totalM;
    // B의 알짜힘 = mB·a  → A가 B에 미치는 힘 = 알짜힘 (왼쪽으로부터 오는 접촉력)
    // A의 알짜힘 = mA·a  → 접촉력 = mA·a (B가 A에 미치는 힘과 반작용)
    derived.netA = mA * derived.a; // A의 알짜힘 (= B가 A에 미치는 힘)
    derived.netB = mB * derived.a; // B의 알짜힘 (= A가 B에 미치는 힘)
    derived.FAB = mA * derived.a;  // A가 B에 미치는 힘
    derived.FBA = mA * derived.a;  // B가 A에 미치는 힘 (작용·반작용 크기 같음)
  } else {
    // A·B·C 수평, F→오른쪽 → A에 작용, 순서 F→[A][B][C]→
    const totalM = mA + mB + mC;
    derived.a = F / totalM;
    derived.netA = mA * derived.a;
    derived.netB = mB * derived.a;
    derived.netC = mC * derived.a;
    // A에 작용하는 알짜힘 = F - (B가 A에 미치는 힘) → B가 A에 미치는 힘 = F - netA = (mB+mC)·a
    derived.FBA = (mB + mC) * derived.a; // B가 A를 밀어내는 힘(왼쪽, 반작용)
    derived.FAB = (mB + mC) * derived.a; // A가 B를 미는 힘(오른쪽)
    // B에 작용하는 알짜힘 = A가 B에 미치는 힘 - C가 B에 미치는 힘
    derived.FCB = mC * derived.a; // C가 B에 미치는 힘(왼쪽)
    derived.FBC = mC * derived.a; // B가 C에 미치는 힘(오른쪽)
  }
}

function fmt(n) { return Number.isInteger(n) ? n : n.toFixed(2); }

// ═══════════════════════════════════════════════════
//  DIAGRAM CANVAS
// ═══════════════════════════════════════════════════
function drawDiagram() {
  const canvas = document.getElementById('diagram-canvas');
  const W = canvas.offsetWidth || 400;
  canvas.width = W; canvas.height = 180;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,180);

  const {mA,mB,mC,F} = masses;
  const a = derived.a;

  // ground
  ctx.strokeStyle='#2e3650'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(20,145); ctx.lineTo(W-20,145); ctx.stroke();
  // hatching
  ctx.strokeStyle='#1e2330'; ctx.lineWidth=1;
  for(let x=30;x<W-20;x+=12) {
    ctx.beginPath(); ctx.moveTo(x,145); ctx.lineTo(x-8,160); ctx.stroke();
  }

  const bW=56, bH=44;
  let objects, startX;
  if(scenario===1) {
    objects = [
      { label:`A\n${mA}kg`, color:'#1a3a5c', stroke:'#4f9eff', x:0 },
      { label:`B\n${mB}kg`, color:'#5c1a1a', stroke:'#ff6b6b', x:bW },
    ];
    startX = W/2 - (2*bW)/2;
  } else {
    objects = [
      { label:`A\n${mA}kg`, color:'#1a3a5c', stroke:'#4f9eff', x:0 },
      { label:`B\n${mB}kg`, color:'#5c1a1a', stroke:'#ff6b6b', x:bW },
      { label:`C\n${mC}kg`, color:'#1a5c3a', stroke:'#6bffb8', x:2*bW },
    ];
    startX = W/2 - (3*bW)/2;
  }

  objects.forEach((obj,idx)=>{
    const bx = startX + obj.x;
    const by = 145 - bH;
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(bx+bW/2,145,bW/2*0.8,5,0,0,Math.PI*2); ctx.fill();
    // box
    ctx.fillStyle = obj.color;
    ctx.beginPath(); ctx.roundRect(bx,by,bW,bH,6); ctx.fill();
    ctx.strokeStyle = obj.stroke; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(bx,by,bW,bH,6); ctx.stroke();
    // label
    ctx.fillStyle='#fff';
    ctx.font='bold 13px "JetBrains Mono"';
    ctx.textAlign='center';
    const lines = obj.label.split('\n');
    lines.forEach((line,i)=> ctx.fillText(line, bx+bW/2, by+bH/2-4+i*15));

    // acceleration arrow above each object
    const ax = bx + bW/2;
    const ay = by - 10;
    ctx.strokeStyle='#ffd166'; ctx.lineWidth=1.5;
    ctx.setLineDash([3,2]);
    ctx.beginPath(); ctx.moveTo(ax-14, ay); ctx.lineTo(ax+10, ay); ctx.stroke();
    ctx.setLineDash([]);
    arrowHead(ctx, ax+10, ay, 0, '#ffd166');
    ctx.fillStyle='#ffd166';
    ctx.font='bold 9px "JetBrains Mono"';
    ctx.textAlign='center';
    ctx.fillText(`a=${fmt(a)}`, ax, ay-6);
  });

  // F arrow
  const firstX = startX;
  const by = 145-bH;
  const fy = by + bH/2;
  ctx.strokeStyle='#c084fc'; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(firstX-44, fy);
  ctx.lineTo(firstX-4, fy);
  ctx.stroke();
  arrowHead(ctx, firstX-4, fy, 0, '#c084fc');
  ctx.fillStyle='#c084fc';
  ctx.font='bold 13px "Noto Sans KR"';
  ctx.textAlign='center';
  ctx.fillText(`F=${F}N`, firstX-24, fy-12);
}

function arrowHead(ctx, x, y, angle, color) {
  ctx.save();
  ctx.translate(x,y); ctx.rotate(angle);
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-10,-5); ctx.lineTo(-10,5); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  STEPS
// ═══════════════════════════════════════════════════
function renderSteps() {
  const {mA,mB,mC,F} = masses;
  const {a,netA,netB,netC,FAB,FBA,FCB,FBC} = derived;
  const totalM = scenario===1 ? mA+mB : mA+mB+mC;

  const steps = [];
  // STEP 1
  steps.push({
    title:'전체 물체계에 운동 방정식 적용',
    body: `여러 물체가 함께 움직일 때, <strong>계 전체</strong>에 뉴턴 제2법칙을 적용하면
물체 사이의 내력(접촉력)은 상쇄되어 사라집니다.<br>
물체계 전체에 작용하는 <strong>외력</strong>만 고려합니다.`,
    formula: `<div class="eq-label">외력 합계 = 전체 질량 × 가속도</div>
<span class="hi-F">F</span> = (m<sub>A</sub>+m<sub>B</sub>${scenario>=2?'+m<sub>C</sub>':''}) × a<br>
<span class="hi-val">${F}</span> = (${mA}+${mB}${scenario>=2?'+'+mC:''}) × a<br>
→ a = ${F}/${totalM} = <span class="hi-val">${fmt(a)} m/s²</span>`
  });

  // STEP 2
  let step2body = `계의 가속도 <strong>a = ${fmt(a)} m/s²</strong>를 이용해 각 물체의 알짜힘을 구합니다.<br>
<em>알짜힘 = 질량 × 가속도</em> (뉴턴 제2법칙)`;
  let step2form = `물체 A: F<sub>알짜,A</sub> = ${mA}×${fmt(a)} = <span class="hi-A">${fmt(netA)} N</span><br>
물체 B: F<sub>알짜,B</sub> = ${mB}×${fmt(a)} = <span class="hi-B">${fmt(netB)} N</span>`;
  if(scenario>=2) step2form += `<br>물체 C: F<sub>알짜,C</sub> = ${mC}×${fmt(a)} = <span class="hi-C">${fmt(netC)} N</span>`;
  steps.push({ title:'각 물체의 알짜힘 계산', body:step2body, formula:step2form });

  // STEP 3
  let step3body, step3form;
  if(scenario===1){
    step3body=`A의 알짜힘 = <span class="hi-A">${fmt(netA)} N</span> (오른쪽)<br>
A에 작용하는 힘: 외력 없음 → <strong>B가 A를 미는 힘(왼쪽→오른쪽)</strong>만 존재<br>
∴ B가 A에 미치는 힘 = F<sub>알짜,A</sub> = ${fmt(FBA)} N (오른쪽)<br><br>
B의 알짜힘 = <span class="hi-B">${fmt(netB)} N</span> (오른쪽)<br>
B에 작용하는 힘: 외력 F=${F}N(오른쪽) + A가 B에 미치는 힘(왼쪽)<br>
∴ A가 B에 미치는 힘 = F − F<sub>알짜,B</sub> = ${F}−${fmt(netB)} = <span class="hi-B">${fmt(FAB)} N</span> (왼쪽)`;
    step3form=`작용·반작용: A↔B 접촉력 = <span class="hi-val">${fmt(FAB)} N</span>`;
  } else {
    step3body=`<strong>물체 A</strong> 알짜힘 = ${fmt(netA)} N<br>
  A에 작용: 외력 F(오른쪽) + B가 A에 미치는 힘(왼쪽)<br>
  → B가 A에 미치는 힘 = F − F<sub>알짜,A</sub> = ${F}−${fmt(netA)} = <span class="hi-A">${fmt(FBA)} N</span><br><br>
<strong>물체 C</strong> 알짜힘 = ${fmt(netC)} N<br>
  C에 작용: B가 C에 미치는 힘(오른쪽)만<br>
  → B가 C에 미치는 힘 = F<sub>알짜,C</sub> = <span class="hi-C">${fmt(FBC)} N</span><br><br>
<strong>물체 B</strong> 알짜힘 = ${fmt(netB)} N<br>
  B에 작용: A가 B에 미치는 힘(오른쪽) + C가 B에 미치는 힘(왼쪽)<br>
  → 확인: ${fmt(FAB)}−${fmt(FCB)} = ${fmt(FAB-FCB)} ≈ F<sub>알짜,B</sub> = ${fmt(netB)} ✓`;
    step3form=`A↔B 접촉력: <span class="hi-val">${fmt(FAB)} N</span> &nbsp;|&nbsp; B↔C 접촉력: <span class="hi-val">${fmt(FBC)} N</span>`;
  }
  steps.push({ title:'접촉력(내력) 결정 — 자유물체도 핵심', body:step3body, formula:step3form });

  // STEP 4
  steps.push({
    title:'작용·반작용 법칙 확인',
    body:`두 물체가 접촉할 때,<br>
<strong>A가 B에 미치는 힘</strong>과 <strong>B가 A에 미치는 힘</strong>은<br>
크기가 같고 방향이 반대 — <em>작용·반작용 쌍</em>`,
    formula: scenario===1
      ? `A→B: <span class="hi-A">${fmt(FAB)} N (왼쪽)</span> &nbsp;↔&nbsp; B→A: <span class="hi-B">${fmt(FBA)} N (오른쪽)</span>`
      : `A→B: <span class="hi-A">${fmt(FAB)} N (오른쪽)</span> ↔ B→A: <span class="hi-A">${fmt(FBA)} N (왼쪽)</span><br>B→C: <span class="hi-C">${fmt(FBC)} N (오른쪽)</span> ↔ C→B: <span class="hi-C">${fmt(FCB)} N (왼쪽)</span>`
  });

  const container = document.getElementById('steps-container');
  container.innerHTML = steps.map((s,i)=>`
    <div class="step active" id="step-${i}" onclick="toggleStep(${i})">
      <div class="step-header">
        <div class="step-num">${i+1}</div>
        <span>${s.title}</span>
      </div>
      <div class="step-body">
        <p>${s.body}</p>
        <div class="formula">${s.formula}</div>
      </div>
    </div>
  `).join('');
}

function toggleStep(i) {
  const el = document.getElementById('step-'+i);
  el.classList.toggle('active');
}

function renderFBD() {
  const {mA,mB,mC,F} = masses;
  const {a,netA,netB,netC,FAB,FBA,FCB,FBC} = derived;
  const area = document.getElementById('fbd-area');

  let objects;
  if(scenario===1){
    objects = [
      {
        label:'물체 A',
        color:'#4f9eff',
        arrows:[
          { dir:'right', mag: fmt(FBA), label:`B→A\n${fmt(FBA)}N`, color:'#4f9eff' },
          { dir:'down', mag:1, label:`중력`, color:'#888' },
          { dir:'up', mag:1, label:`수직항력`, color:'#aaa' },
        ],
        forces:`• 오른쪽: B→A = ${fmt(FBA)} N\n• 알짜힘: ${fmt(netA)} N (오른쪽)`
      },
      {
        label:'물체 B',
        color:'#ff6b6b',
        arrows:[
          { dir:'right', mag: fmt(F), label:`F\n${F}N`, color:'#c084fc' },
          { dir:'left', mag: fmt(FAB), label:`A→B\n${fmt(FAB)}N`, color:'#ff6b6b' },
          { dir:'down', mag:1, label:`중력`, color:'#888' },
          { dir:'up', mag:1, label:`수직항력`, color:'#aaa' },
        ],
        forces:`• 오른쪽: F = ${F} N\n• 왼쪽: A→B = ${fmt(FAB)} N\n• 알짜힘: ${fmt(netB)} N (오른쪽)`
      }
    ];
  } else {
    objects = [
      {
        label:'물체 A',
        color:'#4f9eff',
        arrows:[
          { dir:'right', mag: fmt(F), label:`F\n${F}N`, color:'#c084fc' },
          { dir:'left', mag: fmt(FBA), label:`B→A\n${fmt(FBA)}N`, color:'#4f9eff' },
          { dir:'down', mag:1, label:`중력`, color:'#888' },
          { dir:'up', mag:1, label:`수직항력`, color:'#aaa' },
        ],
        forces:`• 오른쪽: F = ${F} N\n• 왼쪽: B→A = ${fmt(FBA)} N\n• 알짜힘: ${fmt(netA)} N`
      },
      {
        label:'물체 B',
        color:'#ff6b6b',
        arrows:[
          { dir:'right', mag: fmt(FAB), label:`A→B\n${fmt(FAB)}N`, color:'#4f9eff' },
          { dir:'left', mag: fmt(FCB), label:`C→B\n${fmt(FCB)}N`, color:'#6bffb8' },
          { dir:'down', mag:1, label:`중력`, color:'#888' },
          { dir:'up', mag:1, label:`수직항력`, color:'#aaa' },
        ],
        forces:`• 오른쪽: A→B = ${fmt(FAB)} N\n• 왼쪽: C→B = ${fmt(FCB)} N\n• 알짜힘: ${fmt(netB)} N`
      },
      {
        label:'물체 C',
        color:'#6bffb8',
        arrows:[
          { dir:'right', mag: fmt(FBC), label:`B→C\n${fmt(FBC)}N`, color:'#ff6b6b' },
          { dir:'down', mag:1, label:`중력`, color:'#888' },
          { dir:'up', mag:1, label:`수직항력`, color:'#aaa' },
        ],
        forces:`• 오른쪽: B→C = ${fmt(FBC)} N\n• 알짜힘: ${fmt(netC)} N`
      }
    ];
  }

  area.innerHTML = objects.map(obj=>`
    <div class="fbd-card">
      <canvas id="fbd-${obj.label.replace(/\s/,'')}" width="180" height="180"></canvas>
      <h3 style="color:${obj.color}">${obj.label}</h3>
      <div class="fbd-forces">${obj.forces.replace(/\n/g,'<br>')}</div>
    </div>
  `).join('');

  // draw each FBD
  objects.forEach(obj=>{
    const cvId = 'fbd-'+obj.label.replace(/\s/,'');
    const cv = document.getElementById(cvId);
    if(!cv) return;
    drawFBD(cv, obj);
  });
}

function drawFBD(canvas, obj) {
  const ctx = canvas.getContext('2d');
  const W=180, H=180;
  ctx.clearRect(0,0,W,H);

  // box centered in canvas
  const bs=44, bx=(W-bs)/2, by=(H-bs)/2;
  ctx.fillStyle = obj.color+'22';
  ctx.strokeStyle = obj.color;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(bx,by,bs,bs,5); ctx.fill(); ctx.stroke();
  ctx.fillStyle = obj.color;
  ctx.font = 'bold 12px "JetBrains Mono"';
  ctx.textAlign='center';
  ctx.fillText(obj.label.split(' ')[1], bx+bs/2, by+bs/2+4);

  // draw arrows — fixed lengths, labels placed safely inside canvas
  const arrowLen = 46;
  obj.arrows.forEach(ar=>{
    if(ar.mag==0) return;
    const cx=bx+bs/2, cy=by+bs/2;
    let sx,sy,ex,ey;
    if(ar.dir==='right'){ sx=bx+bs; sy=cy; ex=sx+arrowLen; ey=sy; }
    else if(ar.dir==='left'){ sx=bx; sy=cy; ex=sx-arrowLen; ey=sy; }
    else if(ar.dir==='up'){ sx=cx; sy=by; ex=sx; ey=sy-arrowLen; }
    else { sx=cx; sy=by+bs; ex=sx; ey=sy+arrowLen; }

    ctx.strokeStyle=ar.color; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
    // arrowhead
    const angle = Math.atan2(ey-sy, ex-sx);
    ctx.save(); ctx.translate(ex,ey); ctx.rotate(angle);
    ctx.fillStyle=ar.color;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-9,-4); ctx.lineTo(-9,4); ctx.closePath(); ctx.fill();
    ctx.restore();

    // label — placed beside arrow, clamped inside canvas
    ctx.fillStyle=ar.color;
    ctx.font='9px "JetBrains Mono"';
    const lines = ar.label.split('\n');
    let lx, ly;
    if(ar.dir==='right')    { lx=ex+4;   ly=ey-10; ctx.textAlign='left'; }
    else if(ar.dir==='left'){ lx=ex-4;   ly=ey-10; ctx.textAlign='right'; }
    else if(ar.dir==='up')  { lx=cx+6;   ly=ey+4;  ctx.textAlign='left'; }
    else                    { lx=cx+6;   ly=ey+12; ctx.textAlign='left'; }
    lines.forEach((l,i)=>ctx.fillText(l,lx,ly+i*11));
  });
}

// ═══════════════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════════════
function renderQuiz() {
  const {mA,mB,mC,F} = masses;
  const area = document.getElementById('quiz-area');
  checked = false;
  hintShown = false;
  document.getElementById('hint-box').classList.remove('show');
  clearFeedback();

  let rows = [
    { id:'qa', label:'① 물체계의 가속도 a =', unit:'m/s²' },
  ];
  if(scenario===1){
    rows.push({ id:'qfab', label:`② A가 B에 미치는 힘 (알짜힘 또는 접촉력) =`, unit:'N' });
    rows.push({ id:'qfba', label:`③ B가 A에 미치는 힘 =`, unit:'N' });
  } else {
    rows.push({ id:'qfab', label:`② A↔B 접촉력 크기 =`, unit:'N' });
    rows.push({ id:'qfbc', label:`③ B↔C 접촉력 크기 =`, unit:'N' });
    rows.push({ id:'qnb', label:`④ B의 알짜힘 =`, unit:'N' });
  }

  area.innerHTML = rows.map(r=>`
    <div class="quiz-row">
      <div class="quiz-label">${r.label}</div>
      <input type="number" class="quiz-input" id="${r.id}" step="any" placeholder="?">
      <span class="quiz-unit">${r.unit}</span>
      <span class="quiz-feedback" id="fb-${r.id}"></span>
    </div>
  `).join('');
}

function getAnswers() {
  const {a,FAB,FBA,FBC,netB} = derived;
  if(scenario===1){
    return { qa: a, qfab: FAB, qfba: FBA };
  } else {
    return { qa: a, qfab: FAB, qfbc: FBC, qnb: netB };
  }
}

function checkAnswers() {
  const answers = getAnswers();
  let allCorrect = true;
  Object.entries(answers).forEach(([id, ans])=>{
    const inp = document.getElementById(id);
    if(!inp) return;
    const val = parseFloat(inp.value);
    const ok = Math.abs(val - ans) < 0.05;
    inp.classList.remove('correct','wrong');
    inp.classList.add(ok?'correct':'wrong');
    const fb = document.getElementById('fb-'+id);
    fb.textContent = ok ? '✓' : `✗ (정답: ${fmt(ans)})`;
    fb.className = 'quiz-feedback '+(ok?'ok':'no');
    if(!ok) allCorrect = false;
  });
  const msg = document.getElementById('result-msg');
  msg.className = 'result-msg show '+(allCorrect?'correct-msg':'wrong-msg');
  if(allCorrect){
    totalScore += 10;
    document.getElementById('hdr-score').textContent = totalScore;
    msg.textContent = '🎉 모두 정답입니다! 자유물체도를 완벽하게 이해했습니다.';
  } else {
    msg.textContent = '일부 오답이 있습니다. 힌트를 보거나 단계별 풀이를 다시 확인해 보세요.';
  }
  checked = true;
}

function showHint() {
  const {a,FAB,FBA,FBC,netB} = derived;
  const {F,mA,mB,mC} = masses;
  const hint = document.getElementById('hint-box');
  const totalM = scenario===1 ? mA+mB : mA+mB+mC;
  let text = `💡 힌트:<br>
1. 전체 질량 = ${totalM} kg, 외력 = ${F} N<br>
2. 가속도 a = ${F}/${totalM} = <strong>${fmt(a)} m/s²</strong><br>`;
  if(scenario===1){
    text+=`3. A의 알짜힘 = ${mA}×${fmt(a)} = <strong>${fmt(derived.netA)} N</strong><br>
4. A에 외력이 없으므로 B→A = ${fmt(FBA)} N<br>
5. 작용·반작용으로 A→B = ${fmt(FAB)} N`;
  } else {
    text+=`3. C의 알짜힘 = ${mC}×${fmt(a)} = ${fmt(derived.netC)} N<br>
4. C에 작용하는 힘은 B→C뿐이므로 B↔C 접촉력 = <strong>${fmt(FBC)} N</strong><br>
5. A↔B 접촉력 = (mB+mC)×a = (${mB}+${mC})×${fmt(a)} = <strong>${fmt(FAB)} N</strong>`;
  }
  hint.innerHTML = text;
  hint.classList.add('show');
  hintShown = true;
}

function nextProblem() {
  if(scenario===3) randomProblem();
  else {
    // randomize masses slightly
    masses.mA = Math.floor(Math.random()*8)+2;
    masses.mB = Math.floor(Math.random()*8)+1;
    if(scenario>=2) masses.mC = Math.floor(Math.random()*6)+1;
    // nice F values
    const Fopts=[10,12,15,18,20,21,24,27,30];
    masses.F = Fopts[Math.floor(Math.random()*Fopts.length)];
    buildSliders();
  }
  compute();
  renderSteps();
  renderFBD();
  renderQuiz();
  drawDiagram();
}

function clearFeedback() {
  document.getElementById('result-msg').classList.remove('show');
  document.querySelectorAll('.quiz-input').forEach(i=>{
    i.classList.remove('correct','wrong');
    i.value='';
  });
  document.querySelectorAll('.quiz-feedback').forEach(f=>f.textContent='');
}

window.addEventListener('load', ()=>{
  buildSliders();
  compute();
  renderSteps();
  renderFBD();
  renderQuiz();
  drawDiagram();
  window.addEventListener('resize', drawDiagram);
});
</script>
