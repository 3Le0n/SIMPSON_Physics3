<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>물체계의 운동 — 자유물체도 학습</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

/* 색상 팔레트 (참고용)
bg:#111318  surface:#1e2230  surface2:#252b3d  surface3:#2e3550
border:#3a4466  accent:#4f9eff  accent2:#ff6b6b  accent3:#6bffb8
accent4:#ffd166  text:#e8ecf4  text2:#8b94b0  text3:#6a74a0
*/

- { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
background: #111318 !important;
color: #e8ecf4 !important;
}

body {
font-family: ‘Noto Sans KR’, sans-serif;
background: #111318;
color: #e8ecf4;
min-height: 100vh;
overflow-x: hidden;
}

/* ── Header ── */
header {
padding: 12px 16px;
border-bottom: 2px solid #3a4466;
display: flex;
align-items: center;
justify-content: space-between;
background: #1e2230;
gap: 8px;
flex-wrap: nowrap;
min-height: 52px;
box-shadow: 0 2px 12px rgba(0,0,0,0.6);
}
header h1 {
font-size: clamp(0.78rem, 3vw, 1.15rem);
font-weight: 700;
letter-spacing: -0.02em;
color: #e8ecf4;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
flex: 1 1 auto;
min-width: 0;
}
header h1 span { color: #4f9eff; }
.header-right {
display: flex;
align-items: center;
gap: 8px;
flex-shrink: 0;
}
.score-badge {
background: #252b3d;
border: 1px solid #3a4466;
border-radius: 999px;
padding: 5px 12px;
font-size: clamp(0.7rem, 2vw, 0.85rem);
font-family: ‘JetBrains Mono’, monospace;
color: #ffd166;
white-space: nowrap;
}
.credit-badge {
background: #252b3d;
border: 1px solid #3a4466;
border-radius: 999px;
padding: 5px 12px;
font-size: clamp(0.65rem, 1.8vw, 0.78rem);
font-family: ‘Noto Sans KR’, sans-serif;
color: #6a74a0;
white-space: nowrap;
}
.credit-badge span { color: #6bffb8; font-weight: 700; }

/* ── Layout ── */
.app {
max-width: 960px;
margin: 0 auto;
padding: 28px 20px;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}
@media(max-width:700px) { .app { grid-template-columns: 1fr; } }

/* ── Cards ── */
.card {
background: #1e2230;
border: 1px solid #3a4466;
border-radius: 16px;
padding: 22px;
box-shadow: 0 2px 16px rgba(0,0,0,0.6);
}
.card-title {
font-size: 0.72rem;
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
color: #8b94b0;
margin-bottom: 14px;
display: flex;
align-items: center;
gap: 8px;
}
.card-title::before {
content: ‘’;
display: inline-block;
width: 6px; height: 6px;
border-radius: 50%;
background: #4f9eff;
}

/* ── Situation card (full width) ── */
.full-width { grid-column: 1 / -1; }

/* ── Situation selector ── */
.scenario-tabs {
display: flex;
gap: 8px;
margin-bottom: 18px;
flex-wrap: wrap;
}
.scenario-btn {
background: #252b3d;
border: 1px solid #3a4466;
border-radius: 10px;
color: #8b94b0;
padding: 8px 16px;
font-size: 0.82rem;
font-family: ‘Noto Sans KR’, sans-serif;
cursor: pointer;
transition: all 0.2s;
font-weight: 500;
}
.scenario-btn.active {
background: #4f9eff;
border-color: #4f9eff;
color: #fff;
box-shadow: 0 0 20px rgba(79,158,255,0.3);
}
.scenario-btn:hover:not(.active) {
border-color: #4f9eff;
color: #4f9eff;
}

/* ── Sliders ── */
.sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.slider-group label {
display: block;
font-size: 0.78rem;
color: #8b94b0;
margin-bottom: 4px;
}
.slider-group input[type=range] {
width: 100%;
accent-color: #4f9eff;
}
.slider-val {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.85rem;
color: #ffd166;
font-weight: 700;
}

/* ── Canvas ── */
#diagram-canvas {
width: 100%;
border-radius: 10px;
background: #252b3d;
display: block;
}

/* ── Step guide ── */
.steps { display: flex; flex-direction: column; gap: 10px; }
.step {
background: #252b3d;
border: 1px solid #3a4466;
border-radius: 10px;
padding: 14px 16px;
cursor: pointer;
transition: all 0.25s;
position: relative;
overflow: hidden;
}
.step::before {
content: ‘’;
position: absolute; left: 0; top: 0; bottom: 0;
width: 3px;
background: #6a74a0;
transition: background 0.25s;
}
.step.active::before { background: #4f9eff; }
.step.done::before   { background: #6bffb8; }
.step-header {
display: flex;
align-items: center;
gap: 10px;
font-size: 0.85rem;
font-weight: 700;
color: #e8ecf4;
}
.step-num {
width: 22px; height: 22px;
border-radius: 50%;
background: #2e3550;
border: 1px solid #3a4466;
display: flex; align-items: center; justify-content: center;
font-size: 0.72rem;
font-family: ‘JetBrains Mono’, monospace;
color: #6a74a0;
flex-shrink: 0;
transition: all 0.25s;
}
.step.active .step-num { background: #4f9eff; border-color: #4f9eff; color: #fff; }
.step.done   .step-num { background: #6bffb8; border-color: #6bffb8; color: #111318; }
.step-body {
margin-top: 10px;
font-size: 0.82rem;
color: #8b94b0;
line-height: 1.7;
display: none;
}
.step.active .step-body,
.step.done   .step-body { display: block; }

/* formula boxes */
.formula {
background: #2e3550;
border: 1px solid #3a4466;
border-radius: 8px;
padding: 10px 14px;
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.82rem;
color: #ffd166;
margin-top: 8px;
line-height: 1.8;
}
.formula .eq-label {
color: #6a74a0;
font-family: ‘Noto Sans KR’, sans-serif;
font-size: 0.75rem;
margin-bottom: 2px;
}
/* 인라인 요소 배경 투명 처리 */
.step sub, .step sup, .step strong, .step em,
.formula sub, .formula sup, .formula strong, .formula em {
background-color: transparent !important;
}

.hi-A   { color: #4f9eff; font-weight: 700; }
.hi-B   { color: #ff6b6b; font-weight: 700; }
.hi-C   { color: #6bffb8; font-weight: 700; }
.hi-val { color: #ffd166; font-weight: 700; }
.hi-F   { color: #c084fc; font-weight: 700; }

/* ── FBD ── */
.fbd-row {
display: flex;
gap: 12px;
flex-wrap: wrap;
justify-content: center;
}
.fbd-card {
flex: 1;
min-width: 160px;
max-width: 220px;
background: #252b3d;
border: 1px solid #3a4466;
border-radius: 12px;
padding: 12px;
text-align: center;
}
.fbd-card canvas { display: block; margin: 0 auto; max-width: 100%; }
.fbd-card h3 {
font-size: 0.78rem;
color: #8b94b0;
margin-top: 8px;
font-weight: 500;
}
.fbd-card .fbd-forces {
font-size: 0.72rem;
color: #6a74a0;
margin-top: 4px;
line-height: 1.6;
text-align: left;
}

/* ── Quiz ── */
.quiz-section { margin-top: 16px; }
.quiz-row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 10px;
flex-wrap: wrap;
}
.quiz-label {
font-size: 0.82rem;
color: #8b94b0;
min-width: 180px;
}
.quiz-input {
background: #252b3d;
border: 1px solid #3a4466;
border-radius: 8px;
color: #e8ecf4;
padding: 7px 12px;
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.9rem;
width: 90px;
text-align: center;
transition: border-color 0.2s;
}
.quiz-input:focus   { outline: none; border-color: #4f9eff; }
.quiz-input.correct { border-color: #6bffb8; background: rgba(107,255,184,0.08); color: #e8ecf4; }
.quiz-input.wrong   { border-color: #ff6b6b; background: rgba(255,107,107,0.08); color: #e8ecf4; }
.quiz-unit     { font-size: 0.78rem; color: #6a74a0; }
.quiz-feedback { font-size: 0.78rem; margin-left: 4px; }
.quiz-feedback.ok { color: #6bffb8; }
.quiz-feedback.no { color: #ff6b6b; }

.btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.btn {
border: none;
border-radius: 10px;
padding: 10px 22px;
font-size: 0.85rem;
font-family: ‘Noto Sans KR’, sans-serif;
font-weight: 700;
cursor: pointer;
transition: all 0.2s;
}
.btn-primary { background: #4f9eff; color: #fff; }
.btn-primary:hover { filter: brightness(1.15); box-shadow: 0 0 20px rgba(79,158,255,0.3); }
.btn-secondary {
background: #252b3d;
border: 1px solid #3a4466;
color: #8b94b0;
}
.btn-secondary:hover { border-color: #4f9eff; color: #4f9eff; }

/* ── Hint ── */
.hint-box {
background: rgba(79,158,255,0.07);
border: 1px solid rgba(79,158,255,0.25);
border-radius: 10px;
padding: 12px 16px;
font-size: 0.8rem;
color: #8b94b0;
line-height: 1.7;
margin-top: 10px;
display: none;
}
.hint-box.show { display: block; }

/* ── Result ── */
.result-msg {
font-size: 0.88rem;
margin-top: 10px;
padding: 10px 16px;
border-radius: 10px;
display: none;
}
.result-msg.show { display: block; }
.result-msg.correct-msg {
background: rgba(107,255,184,0.1);
border: 1px solid rgba(107,255,184,0.3);
color: #6bffb8;
}
.result-msg.wrong-msg {
background: rgba(255,107,107,0.1);
border: 1px solid rgba(255,107,107,0.3);
color: #ff6b6b;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #111318; }
::-webkit-scrollbar-thumb { background: #3a4466; border-radius: 3px; }

/* ── Force mode buttons ── */
.fmode-btn {
background: #252b3d;
border: 1px solid #3a4466;
border-radius: 8px;
color: #8b94b0;
padding: 6px 14px;
font-size: 0.78rem;
font-family: ‘Noto Sans KR’, sans-serif;
cursor: pointer;
transition: all 0.2s;
font-weight: 500;
}
.fmode-btn.active {
background: #c084fc;
border-color: #c084fc;
color: #fff;
}
.fmode-btn:hover:not(.active) {
border-color: #c084fc;
color: #c084fc;
}
</style>

</head>
<body>

<header>
  <h1>물체계의 운동 <span>—</span> 자유물체도 단계 학습</h1>
  <div class="header-right">
    <div class="score-badge">점수 <span id="hdr-score">0</span></div>
    <div class="credit-badge"><span>조준현T</span></div>
  </div>
</header>

<div class="app">

  <!-- ① 상황 선택 + 질량 설정 -->

  <div class="card full-width">
    <div class="card-title">상황 선택</div>
    <div class="scenario-tabs">
      <button class="scenario-btn active" onclick="setScenario(1)">① A·B 2물체 (수평)</button>
      <button class="scenario-btn" onclick="setScenario(2)">② A·B·C 3물체 (수평)</button>
    </div>
    <div class="sliders" id="slider-area"></div>
    <div id="force-mode-row" style="margin-top:14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
      <span style="font-size:0.78rem; color:#8b94b0;">힘의 방향:</span>
      <button class="fmode-btn active" id="fmode-one" onclick="setForceMode('one')">한쪽만 (왼→오)</button>
      <button class="fmode-btn" id="fmode-both" onclick="setForceMode('both')">양쪽에서 작용</button>
      <span style="font-size:0.78rem; color:#3a4466; margin-left:4px;">|</span>
      <button class="fmode-btn" id="fmode-random" onclick="doRandom()" style="border-color:#ffd166; color:#ffd166;">🎲 랜덤 문제</button>
    </div>
    <div id="force-dir-hint" style="margin-top:8px; font-size:0.75rem; color:#6a74a0;"></div>
  </div>

  <!-- ② 다이어그램 -->

  <div class="card">
    <div class="card-title">물체 배치도</div>
    <canvas id="diagram-canvas" height="180"></canvas>
  </div>

  <!-- ③ 단계별 풀이 가이드 -->

  <div class="card">
    <div class="card-title">단계별 풀이</div>
    <div class="steps" id="steps-container"></div>
  </div>

  <!-- ④ 자유물체도 -->

  <div class="card full-width">
    <div class="card-title">자유물체도 (Free Body Diagram)</div>
    <div class="fbd-row" id="fbd-area"></div>
  </div>

  <!-- ⑤ 연습 문제 입력 -->

  <div class="card full-width">
    <div class="card-title">직접 풀어보기</div>
    <div class="quiz-section" id="quiz-area"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkAnswers()">정답 확인</button>
      <button class="btn btn-secondary" onclick="showHint()">힌트 보기</button>
      <button class="btn btn-secondary" onclick="nextProblem()">새 문제</button>
    </div>
    <div class="hint-box" id="hint-box"></div>
    <div class="result-msg" id="result-msg"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
const g = 10;
let scenario  = 1;
let forceMode = 'one';   // 'one': 왼→오 한쪽  /  'both': 양쪽
// FL: 왼쪽에서 작용하는 힘(오른쪽 방향), FR: 오른쪽에서 작용하는 힘(왼쪽 방향)
let masses = { mA:3, mB:2, mC:2, FL:30, FR:0 };
let derived = {};
let totalScore = 0;
let checked = false;

// ═══════════════════════════════════════════════════
//  FORCE MODE
// ═══════════════════════════════════════════════════
function setForceMode(mode) {
  forceMode = mode;
  document.getElementById('fmode-one').classList.toggle('active',  mode==='one');
  document.getElementById('fmode-both').classList.toggle('active', mode==='both');
  // 양쪽 모드 진입 시 FR을 정수 가속도가 나오는 값으로 초기화
  if(mode==='both' && masses.FR===0) {
    _genBothForces();
  }
  buildSliders();
  compute();
  renderSteps();
  renderFBD();
  renderQuiz();
  drawDiagram();
  clearFeedback();
}

// 양쪽 힘 모드에서 정수 가속도 보장 생성
function _genBothForces() {
  const s = scenario===2 ? 2 : 1;
  let attempts=0;
  while(attempts++<500) {
    const totalM = s===1 ? Math.floor(Math.random()*8)+2 : Math.floor(Math.random()*12)+3;
    const a = Math.floor(Math.random()*8)+1;   // 1~8
    // 알짜힘 = FL - FR = totalM * a → FR = FL - totalM*a
    const FL = Math.floor(Math.random()*7+totalM)*a; // FL > totalM*a
    const FR = FL - totalM*a;
    if(FL<2||FL>100||FR<1||FR>80) continue;
    masses.FL=FL; masses.FR=FR;
    if(s===1) {
      const mA=Math.floor(Math.random()*(totalM-1))+1, mB=totalM-mA;
      if(mB<1||mA>10||mB>10) continue;
      masses.mA=mA; masses.mB=mB; return;
    } else {
      const mA=Math.floor(Math.random()*(totalM-2))+1;
      if(mA>=totalM-1) continue;
      const mB=Math.floor(Math.random()*(totalM-mA-1))+1;
      const mC=totalM-mA-mB;
      if(mC<1||mA>10||mB>10||mC>10) continue;
      masses.mA=mA; masses.mB=mB; masses.mC=mC; return;
    }
  }
}

// ═══════════════════════════════════════════════════
//  SCENARIO SETUP
// ═══════════════════════════════════════════════════
function setScenario(s) {
  scenario = s;
  document.querySelectorAll('.scenario-btn').forEach((b,i)=>b.classList.toggle('active',i===s-1));
  _genIntegerAccel(s);
  buildSliders();
  compute(); renderSteps(); renderFBD(); renderQuiz(); drawDiagram(); clearFeedback();
}

// 랜덤 문제 버튼 — 현재 시나리오(물체 수) + 힘 방향 유지하면서 값만 랜덤 생성
function doRandom() {
  _genIntegerAccel(scenario);
  buildSliders();
  compute(); renderSteps(); renderFBD(); renderQuiz(); drawDiagram(); clearFeedback();
  // 랜덤 버튼 잠깐 강조
  const btn = document.getElementById('fmode-random');
  btn.style.background = '#ffd166';
  btn.style.color = '#111318';
  setTimeout(()=>{ btn.style.background=''; btn.style.color='#ffd166'; }, 400);
}

function _genIntegerAccel(s) {
  let attempts=0;
  while(attempts++<500) {
    const totalM = s===1 ? Math.floor(Math.random()*9)+2 : Math.floor(Math.random()*14)+3;
    const a = Math.floor(Math.random()*9)+1;
    if(forceMode==='one') {
      const F=totalM*a;
      if(F<2||F>100) continue;
      if(s===1){
        const mA=Math.floor(Math.random()*(totalM-1))+1, mB=totalM-mA;
        if(mB<1||mA>10||mB>10) continue;
        masses.mA=mA; masses.mB=mB; masses.FL=F; masses.FR=0; return;
      } else {
        const mA=Math.floor(Math.random()*(totalM-2))+1;
        if(mA>=totalM-1) continue;
        const mB=Math.floor(Math.random()*(totalM-mA-1))+1;
        const mC=totalM-mA-mB;
        if(mC<1||mA>10||mB>10||mC>10) continue;
        masses.mA=mA; masses.mB=mB; masses.mC=mC; masses.FL=F; masses.FR=0; return;
      }
    } else {
      // 양쪽 힘: FL - FR = totalM*a
      const net=totalM*a;
      const FR=Math.floor(Math.random()*6)+1;  // 1~6
      const FL=net+FR;
      if(FL<2||FL>100||FR>80) continue;
      if(s===1){
        const mA=Math.floor(Math.random()*(totalM-1))+1, mB=totalM-mA;
        if(mB<1||mA>10||mB>10) continue;
        masses.mA=mA; masses.mB=mB; masses.FL=FL; masses.FR=FR; return;
      } else {
        const mA=Math.floor(Math.random()*(totalM-2))+1;
        if(mA>=totalM-1) continue;
        const mB=Math.floor(Math.random()*(totalM-mA-1))+1;
        const mC=totalM-mA-mB;
        if(mC<1||mA>10||mB>10||mC>10) continue;
        masses.mA=mA; masses.mB=mB; masses.mC=mC; masses.FL=FL; masses.FR=FR; return;
      }
    }
  }
}

function buildSliders() {
  const area = document.getElementById('slider-area');
  const numC = scenario >= 2;
  // 힘 슬라이더: 양쪽 모드면 FL, FR 각각 / 한쪽이면 FL만
  const forceConfigs = forceMode==='one'
    ? [{ key:'FL', label:'힘 F (N)', min:2, max:100, color:'#c084fc' }]
    : [
        { key:'FL', label:'왼쪽 힘 F<sub style="font-size:0.7em">L</sub> (N)', min:2, max:100, color:'#c084fc' },
        { key:'FR', label:'오른쪽 힘 F<sub style="font-size:0.7em">R</sub> (N)', min:1, max:80, color:'#f97316' },
      ];
  const massConfigs = [
    { key:'mA', label:'A의 질량 (kg)', min:1, max:10, color:'#4f9eff' },
    { key:'mB', label:'B의 질량 (kg)', min:1, max:10, color:'#ff6b6b' },
    ...(numC ? [{ key:'mC', label:'C의 질량 (kg)', min:1, max:10, color:'#6bffb8' }] : []),
  ];
  const all = [...forceConfigs, ...massConfigs];
  area.innerHTML = all.map(c=>`
    <div class="slider-group">
      <label style="color:${c.color}">${c.label}: <span class="slider-val" id="val-${c.key}">${masses[c.key]}</span></label>
      <input type="range" min="${c.min}" max="${c.max}" step="1" value="${masses[c.key]}"
        oninput="updateMass('${c.key}',this.value)">
    </div>
  `).join('');

  // 힌트 텍스트 업데이트
  const hint = document.getElementById('force-dir-hint');
  if(forceMode==='both') {
    const net = masses.FL - masses.FR;
    hint.innerHTML = `알짜 외력 = F<sub>L</sub> − F<sub>R</sub> = ${masses.FL} − ${masses.FR} = <span style="color:#ffd166;font-weight:700;">${net} N</span> (오른쪽)`;
  } else {
    hint.textContent = '';
  }
}

function updateMass(key, val) {
  masses[key] = +val;
  document.getElementById('val-'+key).textContent = val;
  // 힌트 갱신
  if(forceMode==='both') {
    const net=masses.FL-masses.FR;
    document.getElementById('force-dir-hint').innerHTML =
      `알짜 외력 = F<sub>L</sub> − F<sub>R</sub> = ${masses.FL} − ${masses.FR} = <span style="color:#ffd166;font-weight:700;">${net} N</span> (오른쪽)`;
  }
  compute(); renderSteps(); renderFBD(); renderQuiz(); drawDiagram(); clearFeedback();
}

// ═══════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════
function compute() {
  const {mA,mB,mC,FL,FR} = masses;
  const Fnet = FL - FR;   // 알짜 외력 (항상 오른쪽)
  if(scenario===1) {
    // 힘: FL은 A의 왼쪽, FR은 B의 오른쪽에서 반대방향으로
    const totalM = mA+mB;
    derived.a    = Fnet/totalM;
    derived.Fnet = Fnet;
    derived.netA = mA*derived.a;
    derived.netB = mB*derived.a;
    // A의 자유물체도: FL(오른쪽) + B→A(왼쪽) = netA
    //   → B→A = netA - FL  (음수면 오른쪽)
    // 하지만 물리적으로는 F→[A][B]← 구조이므로:
    // A: FL(→) - FAB(←) = mA·a  →  FAB = FL - mA·a = FL - netA
    // B: FAB(→) - FR(←) = mB·a  →  FAB = mB·a + FR = netB + FR  ✓
    derived.FAB  = FL - derived.netA;   // A가 B에 미치는 힘 = A에서 B로 전달
    derived.FBA  = derived.FAB;         // 크기 같음
  } else {
    // F→[A][B][C]← (FL: A 왼쪽, FR: C 오른쪽)
    const totalM = mA+mB+mC;
    derived.a    = Fnet/totalM;
    derived.Fnet = Fnet;
    derived.netA = mA*derived.a;
    derived.netB = mB*derived.a;
    derived.netC = mC*derived.a;
    // A: FL(→) - FAB(←) = netA  →  FAB = FL - netA
    derived.FAB  = FL - derived.netA;
    derived.FBA  = derived.FAB;
    // C: FBC(→) - FR(←) = netC  →  FBC = netC + FR
    derived.FBC  = derived.netC + FR;
    derived.FCB  = derived.FBC;
  }
}

function fmt(n) {
  if(typeof n!=='number'||isNaN(n)) return '?';
  return Number.isInteger(n) ? n : parseFloat(n.toFixed(2));
}

// ═══════════════════════════════════════════════════
//  DIAGRAM CANVAS
// ═══════════════════════════════════════════════════
function drawDiagram() {
  const canvas = document.getElementById('diagram-canvas');
  const W = canvas.offsetWidth||400;
  canvas.width=W; canvas.height=190;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,190);

  const {mA,mB,mC,FL,FR} = masses;
  const a = derived.a;

  // ground
  ctx.strokeStyle='#3a4466'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(20,148); ctx.lineTo(W-20,148); ctx.stroke();
  ctx.strokeStyle='#252b3d'; ctx.lineWidth=1;
  for(let x=30;x<W-20;x+=12){
    ctx.beginPath(); ctx.moveTo(x,148); ctx.lineTo(x-8,163); ctx.stroke();
  }

  const bW=56, bH=44;
  let objects, startX;
  if(scenario===1){
    objects=[
      {label:`A\n${mA}kg`,color:'#1a3a5c',stroke:'#4f9eff',x:0},
      {label:`B\n${mB}kg`,color:'#5c1a1a',stroke:'#ff6b6b',x:bW},
    ];
    startX=W/2-(2*bW)/2;
  } else {
    objects=[
      {label:`A\n${mA}kg`,color:'#1a3a5c',stroke:'#4f9eff',x:0},
      {label:`B\n${mB}kg`,color:'#5c1a1a',stroke:'#ff6b6b',x:bW},
      {label:`C\n${mC}kg`,color:'#1a5c3a',stroke:'#6bffb8',x:2*bW},
    ];
    startX=W/2-(3*bW)/2;
  }

  objects.forEach((obj)=>{
    const bx=startX+obj.x, by=148-bH;
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(bx+bW/2,148,bW/2*0.8,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=obj.color;
    ctx.beginPath(); ctx.roundRect(bx,by,bW,bH,6); ctx.fill();
    ctx.strokeStyle=obj.stroke; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(bx,by,bW,bH,6); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 13px "JetBrains Mono"'; ctx.textAlign='center';
    obj.label.split('\n').forEach((ln,i)=>ctx.fillText(ln,bx+bW/2,by+bH/2-4+i*15));
    // 가속도 화살표 (위)
    const ax=bx+bW/2, ay=by-12;
    ctx.strokeStyle='#ffd166'; ctx.lineWidth=1.5; ctx.setLineDash([3,2]);
    ctx.beginPath(); ctx.moveTo(ax-14,ay); ctx.lineTo(ax+10,ay); ctx.stroke();
    ctx.setLineDash([]);
    arrowHead(ctx,ax+10,ay,0,'#ffd166');
    ctx.fillStyle='#ffd166'; ctx.font='bold 9px "JetBrains Mono"'; ctx.textAlign='center';
    ctx.fillText(`a=${fmt(a)}`,ax,ay-5);
  });

  const firstX=startX, lastX=startX+(objects.length-1)*bW;
  const by=148-bH, fy=by+bH/2;

  // FL 화살표 (왼쪽→)
  ctx.strokeStyle='#c084fc'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(firstX-46,fy); ctx.lineTo(firstX-4,fy); ctx.stroke();
  arrowHead(ctx,firstX-4,fy,0,'#c084fc');
  ctx.fillStyle='#c084fc'; ctx.font='bold 12px "Noto Sans KR"'; ctx.textAlign='center';
  ctx.fillText(forceMode==='one'?`F=${FL}N`:`F_L=${FL}N`, firstX-25, fy-12);

  // FR 화살표 (오른쪽←) - 양쪽 모드일 때만
  if(forceMode==='both' && FR>0) {
    const rx=lastX+bW;
    ctx.strokeStyle='#f97316'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(rx+46,fy); ctx.lineTo(rx+4,fy); ctx.stroke();
    arrowHead(ctx,rx+4,fy,Math.PI,'#f97316');
    ctx.fillStyle='#f97316'; ctx.font='bold 12px "Noto Sans KR"'; ctx.textAlign='center';
    ctx.fillText(`F_R=${FR}N`, rx+25, fy-12);
  }
}

function arrowHead(ctx,x,y,angle,color){
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-10,-5); ctx.lineTo(-10,5); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  STEPS
// ═══════════════════════════════════════════════════
function renderSteps() {
  const {mA,mB,mC,FL,FR}=masses;
  const {a,Fnet,netA,netB,netC,FAB,FBA,FCB,FBC}=derived;
  const totalM=scenario===1?mA+mB:mA+mB+mC;
  const both=forceMode==='both';
  const Fexpr= both ? `F<sub>L</sub>−F<sub>R</sub> = ${FL}−${FR}` : `F = ${FL}`;

  const steps=[];

  // STEP 1
  steps.push({
    title:'전체 물체계에 운동 방정식 적용',
    body:`여러 물체가 함께 움직일 때, <strong>계 전체</strong>에 뉴턴 제2법칙을 적용하면
물체 사이의 내력(접촉력)은 상쇄되어 사라집니다.<br>
물체계 전체에 작용하는 <strong>알짜 외력</strong>만 고려합니다.`,
    formula:`<div class="eq-label">알짜 외력 = 전체 질량 × 가속도</div>
${Fexpr} = (${mA}+${mB}${scenario>=2?'+'+mC:''}) × a<br>
<span class="hi-val">${fmt(Fnet)}</span> = ${totalM} × a<br>
→ a = ${fmt(Fnet)}/${totalM} = <span class="hi-val">${fmt(a)} m/s²</span>`
  });

  // STEP 2
  let s2f=`물체 A: F<sub>알짜,A</sub> = ${mA}×${fmt(a)} = <span class="hi-A">${fmt(netA)} N</span><br>
물체 B: F<sub>알짜,B</sub> = ${mB}×${fmt(a)} = <span class="hi-B">${fmt(netB)} N</span>`;
  if(scenario>=2) s2f+=`<br>물체 C: F<sub>알짜,C</sub> = ${mC}×${fmt(a)} = <span class="hi-C">${fmt(netC)} N</span>`;
  steps.push({title:'각 물체의 알짜힘 계산',
    body:`계의 가속도 <strong>a = ${fmt(a)} m/s²</strong>로 각 물체의 알짜힘을 계산합니다.<br><em>알짜힘 = 질량 × 가속도</em> (뉴턴 제2법칙)`,
    formula:s2f});

  // STEP 3
  let s3b, s3f;
  if(scenario===1){
    const FLlabel = both?`F<sub>L</sub>=${FL}N`:`F=${FL}N`;
    const FRlabel = both?`F<sub>R</sub>=${FR}N`:'';
    s3b=`<strong>물체 A</strong> 알짜힘 = ${fmt(netA)} N (→)<br>
A에 작용: ${FLlabel}(→)${ both?`, ${FRlabel} 없음`:'' } + B가 A에 미치는 힘(←)<br>
→ B→A = ${FL} − ${fmt(netA)} = <span class="hi-A">${fmt(FBA)} N</span> (←)<br><br>
<strong>물체 B</strong> 알짜힘 = ${fmt(netB)} N (→)<br>
B에 작용: A→B(→)${ both?` + ${FRlabel}(←)`:'' }<br>
→ A→B = ${fmt(netB)}${ both?` + ${FR}`:'' } = <span class="hi-B">${fmt(FAB)} N</span> (→)`;
    s3f=`작용·반작용: A↔B 접촉력 = <span class="hi-val">${fmt(FAB)} N</span>`;
  } else {
    const FRlabel = both?`F<sub>R</sub>=${FR}N`:'없음';
    s3b=`<strong>물체 A</strong>: F<sub>L</sub>(→) − A↔B 접촉력(←) = F<sub>알짜,A</sub><br>
→ A↔B 접촉력 = ${FL} − ${fmt(netA)} = <span class="hi-A">${fmt(FAB)} N</span><br><br>
<strong>물체 C</strong>: B↔C 접촉력(→) − ${ both?`F<sub>R</sub>(←)`:'0' } = F<sub>알짜,C</sub><br>
→ B↔C 접촉력 = ${fmt(netC)}${ both?` + ${FR}`:'' } = <span class="hi-C">${fmt(FBC)} N</span><br><br>
<strong>물체 B 확인</strong>: ${fmt(FAB)} − ${fmt(FBC)} = ${fmt(FAB-FBC)} ≈ F<sub>알짜,B</sub> = ${fmt(netB)} ✓`;
    s3f=`A↔B: <span class="hi-val">${fmt(FAB)} N</span> &nbsp;|&nbsp; B↔C: <span class="hi-val">${fmt(FBC)} N</span>`;
  }
  steps.push({title:'접촉력(내력) 결정 — 자유물체도 핵심', body:s3b, formula:s3f});

  // STEP 4
  steps.push({title:'작용·반작용 법칙 확인',
    body:`두 물체가 접촉할 때,<br><strong>A가 B에 미치는 힘</strong>과 <strong>B가 A에 미치는 힘</strong>은<br>크기가 같고 방향이 반대 — <em>작용·반작용 쌍</em>`,
    formula: scenario===1
      ? `A→B: <span class="hi-B">${fmt(FAB)} N (←)</span> &nbsp;↔&nbsp; B→A: <span class="hi-A">${fmt(FBA)} N (→)</span>`
      : `A→B: <span class="hi-A">${fmt(FAB)} N (→)</span> ↔ B→A: <span class="hi-A">${fmt(FBA)} N (←)</span><br>B→C: <span class="hi-C">${fmt(FBC)} N (→)</span> ↔ C→B: <span class="hi-C">${fmt(FCB)} N (←)</span>`
  });

  document.getElementById('steps-container').innerHTML = steps.map((s,i)=>`
    <div class="step active" id="step-${i}" onclick="toggleStep(${i})">
      <div class="step-header"><div class="step-num">${i+1}</div><span>${s.title}</span></div>
      <div class="step-body"><p>${s.body}</p><div class="formula">${s.formula}</div></div>
    </div>`).join('');
}

function toggleStep(i){ document.getElementById('step-'+i).classList.toggle('active'); }

function renderFBD(){

  const {netA,netB,netC,FAB,FBA,FCB,FBC}=derived;

    objects=[
      { label:'물체 A', color:'#4f9eff', arrows:[
          {dir:'right', label:FLlbl,   color:'#c084fc'},
          {dir:'left',  label:`B→A\n${fmt(FBA)}N`, color:'#4f9eff'},
          ...(both&&FR>0?[{dir:'left',label:FRlbl,color:'#f97316'}]:[]),
          {dir:'down',label:'중력',color:'#666'},{dir:'up',label:'수직항력',color:'#888'},
        ],
        forces:`• →: ${both?'F_L':' F'}=${FL}N\n• ←: B→A=${fmt(FBA)}N\n• 알짜힘: ${fmt(netA)}N`
      },
      { label:'물체 B', color:'#ff6b6b', arrows:[
          {dir:'right',label:`A→B\n${fmt(FAB)}N`,color:'#4f9eff'},
          ...(both&&FR>0?[{dir:'left',label:FRlbl,color:'#f97316'}]:[]),
          {dir:'down',label:'중력',color:'#666'},{dir:'up',label:'수직항력',color:'#888'},
        ],
        forces:`• →: A→B=${fmt(FAB)}N${both?`\n• ←: F_R=${FR}N`:''}\n• 알짜힘: ${fmt(netB)}N`
      },
    ];
  } else {
    objects=[
      { label:'물체 A', color:'#4f9eff', arrows:[
          {dir:'right',label:FLlbl,color:'#c084fc'},
          {dir:'left', label:`B→A\n${fmt(FBA)}N`,color:'#4f9eff'},
          {dir:'down',label:'중력',color:'#666'},{dir:'up',label:'수직항력',color:'#888'},
        ],
        forces:`• →: ${both?'F_L':' F'}=${FL}N\n• ←: B→A=${fmt(FBA)}N\n• 알짜힘: ${fmt(netA)}N`
      },
      { label:'물체 B', color:'#ff6b6b', arrows:[
          {dir:'right',label:`A→B\n${fmt(FAB)}N`,color:'#4f9eff'},
          {dir:'left', label:`C→B\n${fmt(FCB)}N`,color:'#6bffb8'},
          {dir:'down',label:'중력',color:'#666'},{dir:'up',label:'수직항력',color:'#888'},
        ],
        forces:`• →: A→B=${fmt(FAB)}N\n• ←: C→B=${fmt(FCB)}N\n• 알짜힘: ${fmt(netB)}N`
      },
      { label:'물체 C', color:'#6bffb8', arrows:[
          {dir:'right',label:`B→C\n${fmt(FBC)}N`,color:'#ff6b6b'},
          ...(both&&FR>0?[{dir:'left',label:FRlbl,color:'#f97316'}]:[]),
          {dir:'down',label:'중력',color:'#666'},{dir:'up',label:'수직항력',color:'#888'},
        ],
        forces:`• →: B→C=${fmt(FBC)}N${both?`\n• ←: F_R=${FR}N`:''}\n• 알짜힘: ${fmt(netC)}N`
      },

  }

  const area=document.getElementById('fbd-area');
  area.innerHTML=objects.map(obj=>`
    <div class="fbd-card">

      <h3 style="color:${obj.color}">${obj.label}</h3>
      <div class="fbd-forces">${obj.forces.replace(/\n/g,'<br>')}</div>

  objects.forEach(obj=>{
    const cv=document.getElementById('fbd-'+obj.label.replace(/\s/,''));
    if(cv) drawFBD(cv,obj);
  });
}

function drawFBD(canvas,obj){
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,180,180);
  const bs=44,bx=68,by=68;
  ctx.fillStyle=obj.color+'22'; ctx.strokeStyle=obj.color; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(bx,by,bs,bs,5); ctx.fill(); ctx.stroke();
  ctx.fillStyle=obj.color; ctx.font='bold 12px "JetBrains Mono"'; ctx.textAlign='center';
  ctx.fillText(obj.label.split(' ')[1],bx+bs/2,by+bs/2+4);

  const arrowLen=44;
  obj.arrows.forEach(ar=>{
    const cx=bx+bs/2, cy=by+bs/2;
    let sx,sy,ex,ey;
    if(ar.dir==='right'){sx=bx+bs;sy=cy;ex=sx+arrowLen;ey=sy;}
    else if(ar.dir==='left'){sx=bx;sy=cy;ex=sx-arrowLen;ey=sy;}
    else if(ar.dir==='up'){sx=cx;sy=by;ex=cx;ey=sy-arrowLen;}
    else{sx=cx;sy=by+bs;ex=cx;ey=sy+arrowLen;}
    ctx.strokeStyle=ar.color; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
    const angle=Math.atan2(ey-sy,ex-sx);
    ctx.save(); ctx.translate(ex,ey); ctx.rotate(angle);
    ctx.fillStyle=ar.color;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-9,-4); ctx.lineTo(-9,4); ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.fillStyle=ar.color; ctx.font='9px "JetBrains Mono"';
    const lines=ar.label.split('\n');
    let lx,ly;
    if(ar.dir==='right'){lx=ex+4;ly=ey-10;ctx.textAlign='left';}
    else if(ar.dir==='left'){lx=ex-4;ly=ey-10;ctx.textAlign='right';}
    else if(ar.dir==='up'){lx=cx+6;ly=ey+4;ctx.textAlign='left';}
    else{lx=cx+6;ly=ey+12;ctx.textAlign='left';}
    lines.forEach((l,i)=>ctx.fillText(l,lx,ly+i*11));
  });
}

function renderQuiz(){
  const area=document.getElementById('quiz-area');
  checked=false;
  document.getElementById('hint-box').classList.remove('show');
  clearFeedback();
  let rows=[{id:'qa',label:'① 물체계의 가속도 a =',unit:'m/s²'}];
  if(scenario===1){
    rows.push({id:'qfab',label:'② A↔B 접촉력 크기 =',unit:'N'});
    rows.push({id:'qfba',label:'③ B가 A에 미치는 힘 =',unit:'N'});
  } else {
    rows.push({id:'qfab',label:'② A↔B 접촉력 크기 =',unit:'N'});
    rows.push({id:'qfbc',label:'③ B↔C 접촉력 크기 =',unit:'N'});
    rows.push({id:'qnb', label:'④ B의 알짜힘 =',unit:'N'});
  }
  area.innerHTML=rows.map(r=>`
    <div class="quiz-row">
      <div class="quiz-label">${r.label}</div>
      <input type="number" class="quiz-input" id="${r.id}" step="any" placeholder="?">
      <span class="quiz-unit">${r.unit}</span>
      <span class="quiz-feedback" id="fb-${r.id}"></span>
    </div>`).join('');
}

function getAnswers(){
  const {a,FAB,FBA,FBC,netB}=derived;
  return scenario===1 ? {qa:a,qfab:FAB,qfba:FBA} : {qa:a,qfab:FAB,qfbc:FBC,qnb:netB};
}

function checkAnswers(){
  const answers=getAnswers();
  let allCorrect=true;
  Object.entries(answers).forEach(([id,ans])=>{
    const inp=document.getElementById(id); if(!inp) return;
    const ok=Math.abs(parseFloat(inp.value)-ans)<0.05;
    inp.classList.remove('correct','wrong'); inp.classList.add(ok?'correct':'wrong');
    const fb=document.getElementById('fb-'+id);
    fb.textContent=ok?'✓':`✗ (정답: ${fmt(ans)})`; fb.className='quiz-feedback '+(ok?'ok':'no');
    if(!ok) allCorrect=false;
  });
  const msg=document.getElementById('result-msg');
  msg.className='result-msg show '+(allCorrect?'correct-msg':'wrong-msg');
  if(allCorrect){totalScore+=10; document.getElementById('hdr-score').textContent=totalScore; msg.textContent='🎉 모두 정답입니다! 자유물체도를 완벽하게 이해했습니다.';}
  else msg.textContent='일부 오답이 있습니다. 힌트를 보거나 단계별 풀이를 다시 확인해 보세요.';
  checked=true;
}

function showHint(){
  const {a,FAB,FBC,netB}=derived;
  const {FL,FR,mA,mB,mC}=masses;
  const totalM=scenario===1?mA+mB:mA+mB+mC;
  const Fnet=FL-FR;
  const both=forceMode==='both';
  let text=`💡 힌트:<br>1. 전체 질량 = ${totalM} kg, 알짜 외력 = ${both?`${FL}−${FR}=`:''}${Fnet} N<br>2. a = ${Fnet}/${totalM} = <strong>${fmt(a)} m/s²</strong><br>`;
  if(scenario===1) text+=`3. A에 작용: FL(→)${both?`+FR(←)`:''}이므로 B→A = ${FL}−${fmt(derived.netA)}${both?`+${FR}`:''} = <strong>${fmt(derived.FBA)} N</strong>`;
  else text+=`3. A↔B 접촉력 = FL−F<sub>알짜,A</sub> = ${FL}−${fmt(derived.netA)} = <strong>${fmt(FAB)} N</strong><br>4. B↔C 접촉력 = F<sub>알짜,C</sub>${both?`+FR`:''}= ${fmt(derived.netC)}${both?`+${FR}`:''} = <strong>${fmt(FBC)} N</strong>`;
  document.getElementById('hint-box').innerHTML=text;
  document.getElementById('hint-box').classList.add('show');
}

function nextProblem(){
  _genIntegerAccel(scenario);
  buildSliders();
  compute(); renderSteps(); renderFBD(); renderQuiz(); drawDiagram();
}

function clearFeedback(){
  document.getElementById('result-msg').classList.remove('show');
  document.querySelectorAll('.quiz-input').forEach(i=>{i.classList.remove('correct','wrong');i.value='';});
  document.querySelectorAll('.quiz-feedback').forEach(f=>f.textContent='');
}

window.addEventListener('load',()=>{
  _genIntegerAccel(1);
  buildSliders();
  compute(); renderSteps(); renderFBD(); renderQuiz(); drawDiagram();
  window.addEventListener('resize', drawDiagram);
});
</script>
